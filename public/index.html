<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BD Phone & IP Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .card { 
            background: white; 
            border-radius: 15px; 
            padding: 30px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        h1 { text-align: center; color: #333; margin-bottom: 30px; }
        .input-group { margin-bottom: 20px; }
        input { 
            width: 100%; padding: 15px; border: 2px solid #e1e5e9; 
            border-radius: 10px; font-size: 16px; transition: all 0.3s;
        }
        input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }
        button { 
            width: 100%; padding: 15px; background: #667eea; 
            color: white; border: none; border-radius: 10px; 
            font-size: 16px; cursor: pointer; transition: all 0.3s;
        }
        button:hover { background: #5a67d8; transform: translateY(-2px); }
        .results { 
            background: #f8f9ff; border-radius: 10px; padding: 20px; 
            margin-top: 20px; border-left: 5px solid #667eea;
        }
        .result-item { display: flex; justify-content: space-between; margin: 10px 0; padding: 10px; background: white; border-radius: 8px; }
        .bd-flag { background: #00a651; color: white; padding: 5px 10px; border-radius: 20px; font-size: 12px; }
        .error { background: #fee; color: #c33; border-left-color: #c33; }
        #map { height: 300px; margin-top: 20px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🇧🇩 Bangladesh Phone & IP Tracker</h1>
        
        <!-- Phone Tracker -->
        <div class="card">
            <h3>📱 Phone Number Tracker</h3>
            <div class="input-group">
                <input type="tel" id="phoneInput" placeholder="+88017xxxxxxxxx or 017xxxxxxxxx" maxlength="14">
                <button id="phoneBtn">Trace Phone</button>
            </div>
            <div id="phoneResults"></div>
        </div>

        <!-- IP Tracker -->
        <div class="card">
            <h3>🌐 IP Geolocation</h3>
            <div class="input-group">
                <input type="text" id="ipInput" placeholder="Enter IP address or leave blank for your IP">
                <button id="ipBtn">Trace IP</button>
                <button id="myIpBtn" style="background: #48bb78; margin-left: 10px; width: auto; padding: 15px 20px;">My IP</button>
            </div>
            <div id="ipResults"></div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
